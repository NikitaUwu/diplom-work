<template>
  <div class="mx-auto w-full max-w-screen-xl px-4 py-8 sm:px-6 sm:py-10 lg:px-10">
    <div class="grid grid-cols-1 gap-4 lg:grid-cols-12 lg:items-center">
      <div class="lg:col-span-6">
        <div class="text-xs text-slate-500 dark:text-slate-400">Сплайн по N точкам</div>
        <h1 class="mt-1 text-2xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">
          График #${chartId || '—'}
        </h1>
      </div>

      <div class="lg:col-span-6">
        <div class="flex flex-wrap items-center gap-3 lg:justify-end">
          <span if.bind="chart" class="inline-flex items-center rounded-full px-3 py-1 text-xs font-medium ${chartStatusClass}">
            ${chartStatusText}
          </span>

          <a
            load.bind="`/charts/${chartId}`"
            class="inline-flex h-10 items-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            Назад к графику
          </a>

          <a
            load="/results"
            class="inline-flex h-10 items-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            Результаты
          </a>
        </div>
      </div>
    </div>

    <div if.bind="error" class="mt-6 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-900/40 dark:bg-rose-950/40 dark:text-rose-300">
      ${error}
    </div>

    <div if.bind="chart?.status === 'error' && chart?.errorMessage" class="mt-6 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-900/40 dark:bg-rose-950/40 dark:text-rose-300">
      ${chart.errorMessage}
    </div>

    <section if.bind="chart" class="mt-6 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
      <div class="grid grid-cols-1 gap-4 lg:grid-cols-[220px_auto] lg:items-end">
        <label class="flex flex-col gap-2">
          <span class="text-xs font-medium uppercase tracking-wide text-slate-500 dark:text-slate-400">Количество точек</span>
          <input
            type="number"
            min="2"
            step="1"
            value.bind="pointCount"
            input.trigger="onPointCountInput($event)"
            class="h-11 rounded-xl bg-white px-3 text-sm ring-1 ring-slate-200 outline-none transition focus:ring-2 focus:ring-slate-400 dark:bg-slate-950 dark:ring-slate-800">
        </label>

        <div class="flex flex-wrap items-center gap-3">
          <button
            type="button"
            click.trigger="build()"
            disabled.bind="!canBuild"
            class="inline-flex h-11 items-center rounded-xl bg-slate-900 px-5 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">
            ${building ? 'Строим…' : 'Построить сплайн'}
          </button>

          <div if.bind="chart?.status !== 'done'" class="text-sm text-slate-500 dark:text-slate-400">
            Редактор станет доступен после завершения обработки графика.
          </div>
        </div>
      </div>

      <div if.bind="buildError" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-900/40 dark:bg-rose-950/40 dark:text-rose-300">
        ${buildError}
      </div>

      <div class="mt-6">
        <compact-graph-editor
          chart-id.bind="chartId"
          backdrop-image-url.bind="chart ? chartFileUrl(chart.id, 'original') : undefined"
          show-backdrop.bind="true"
          result-json.bind="editorResultJson"
          mode="compact"
          on-result-json-change.bind="onEditorResultJsonChange">
        </compact-graph-editor>
      </div>
    </section>
  </div>
</template>
