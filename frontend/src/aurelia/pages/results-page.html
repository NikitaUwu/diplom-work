<template>
  <div class="mx-auto w-full max-w-screen-xl px-4 py-8 sm:px-6 sm:py-10 lg:px-10">
    <div class="grid grid-cols-1 gap-4 lg:grid-cols-12 lg:items-start">
      <div class="lg:col-span-7">
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">Мои результаты</h1>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
          Список всех обработанных изображений и диагностических артефактов.
        </p>
      </div>

      <div class="lg:col-span-5">
        <div class="flex flex-wrap items-center gap-2 lg:justify-end">
          <button
            type="button"
            click.trigger="load()"
            disabled.bind="isLoading"
            class="inline-flex h-10 items-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            Обновить
          </button>
          <a
            href="/upload"
            class="inline-flex h-10 items-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            Загрузить новое
          </a>
        </div>
      </div>
    </div>

    <div if.bind="isLoading" class="mt-6 rounded-2xl bg-white px-6 py-5 text-sm text-slate-600 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:text-slate-300 dark:ring-slate-800">
      Загружаем результаты…
    </div>

    <div if.bind="error" class="mt-6 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-900/40 dark:bg-rose-950/40 dark:text-rose-300">
      ${error}
    </div>

    <div if.bind="!isLoading && !error && items.length === 0" class="mt-6 rounded-2xl bg-white px-6 py-5 text-sm text-slate-600 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:text-slate-300 dark:ring-slate-800">
      Результатов пока нет.
    </div>

    <div if.bind="!isLoading && items.length > 0" class="mt-6 space-y-6">
      <section repeat.for="chart of items" class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <div>
            <div class="text-lg font-semibold text-slate-900 dark:text-slate-100">Задача #${chart.id}</div>
            <div class="mt-1 text-sm text-slate-600 dark:text-slate-400">${chart.originalFilename} • ${formatDate(chart.createdAt)}</div>
          </div>

          <div class="flex flex-wrap items-center gap-2">
            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-medium ${statusClass(chart.status)}">
              ${statusText(chart.status)}
            </span>

            <a
              href.bind="`/charts/${chart.id}`"
              class="inline-flex h-10 items-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
              Открыть
            </a>

            <button
              type="button"
              click.trigger="deleteItem(chart.id)"
              disabled.bind="deletingId === chart.id"
              class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-rose-600 text-sm font-medium text-white transition hover:bg-rose-700 disabled:cursor-not-allowed disabled:opacity-50">
              ×
            </button>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-1 gap-6 lg:grid-cols-[1fr_280px]">
          <image-carousel items.bind="buildCarouselItems(chart)"></image-carousel>

          <div class="rounded-2xl bg-slate-50 p-4 ring-1 ring-slate-200 dark:bg-slate-900/40 dark:ring-slate-800">
            <div class="text-sm font-semibold text-slate-900 dark:text-slate-100">Информация</div>
            <div class="mt-2 space-y-1 text-sm text-slate-700 dark:text-slate-300">
              <div><span class="text-slate-500 dark:text-slate-400">Статус:</span> ${statusText(chart.status)}</div>
              <div><span class="text-slate-500 dark:text-slate-400">Серий:</span> ${chart.nSeries ?? '—'}</div>
              <div><span class="text-slate-500 dark:text-slate-400">Панелей:</span> ${chart.nPanels ?? '—'}</div>
            </div>

            <div if.bind="chart.status === 'error' && chart.errorMessage" class="mt-3 rounded-xl bg-white p-3 text-xs text-rose-700 ring-1 ring-rose-200 dark:bg-slate-950 dark:text-rose-300 dark:ring-rose-900/40">
              ${chart.errorMessage}
            </div>

            <div if.bind="chart.status === 'done'" class="mt-4 grid grid-cols-1 gap-2">
              <button
                type="button"
                click.trigger="exportAllPointsCsv(chart)"
                disabled.bind="!canExportAllPoints(chart)"
                class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-900 px-3 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">
                Все точки CSV
              </button>
              <button
                type="button"
                click.trigger="exportAllPointsJson(chart)"
                disabled.bind="!canExportAllPoints(chart)"
                class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-900 px-3 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">
                Все точки JSON
              </button>
              <button
                type="button"
                click.trigger="exportAutoSplinePointsCsv(chart)"
                disabled.bind="!canExportAutoSplinePoints(chart)"
                class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-900 px-3 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">
                Опорные точки CSV
              </button>
              <button
                type="button"
                click.trigger="exportAutoSplinePointsJson(chart)"
                disabled.bind="!canExportAutoSplinePoints(chart)"
                class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-900 px-3 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">
                Опорные точки JSON
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</template>
